volumes:
  index4_data:
  service-data:
  wpdb_data:
  wp-content:

networks:
  traefik-public:
    external: true

services:
  indexer:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.4
    container_name: indexer
    volumes:
      - index4_data:/usr/share/elasticsearch/data
    environment:
      discovery.type: "single-node"
      ES_JAVA_OPTS: "-Xms2048m -Xmx2048m"
      xpack.security.enabled: "false"
    networks:
      - traefik-public

  service:
#    image: ghcr.io/knaw-huc/ineo_service:test
    image: registry.diginfra.net/tsd/ineo-service:test
    container_name: service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ineo-service.rule=Host(`ineo-service.dev.diginfra.org`)"
      - "traefik.http.services.ineo-service.loadbalancer.server.port=8000"
      - "traefik.http.routers.ineo-service.entrypoints=http"
    ports:
      - "8000:8000"
    depends_on:
      - indexer
    environment:
      ELASTICSEARCH_SCHEME: "http"
      ELASTICSEARCH_HOST: "indexer"
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_INDEX: "ineo"
#      ELASTICSEARCH_USERNAME: "ineouser"
#      ELASTICSEARCH_PASSWORD: "ineopassword"
      FRONTEND_HOST: $FRONTEND_HOST
      FLASK_ENV: $FLASK_ENV
      LOG_LEVEL: $LOG_LEVEL
    volumes:
      - ./service-data:/data
    networks:
      - traefik-public

  ineo:
    image: registry.diginfra.net/tsd/ineo-web:test
    container_name: ineo
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ineo.rule=Host(`ineo.dev.diginfra.org`)"
      - "traefik.http.services.ineo.loadbalancer.server.port=80"
      - "traefik.http.routers.ineo.entrypoints=http"
    ports:
      - "3000:80"
    depends_on:
      - service
      - indexer
    networks:
      - traefik-public
