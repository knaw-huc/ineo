volumes:
  index4_data:
  service-data:
  wpdb_data:
  wp-content:

networks:
  traefik-public:
    external: true

services:
  indexer:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.4
    container_name: indexer
    volumes:
      - index4_data:/usr/share/elasticsearch/data
    environment:
      discovery.type: "single-node"
      ES_JAVA_OPTS: "-Xms2048m -Xmx2048m"
      xpack.security.enabled: "false"
    networks:
      - traefik-public

  service:
#    image: ghcr.io/knaw-huc/ineo_service:test
    image: registry.diginfra.net/tsd/ineo-service:test
    container_name: service
    ports:
      - "8000:8000"
    depends_on:
      - indexer
    environment:
      ELASTICSEARCH_SCHEME: "http"
      ELASTICSEARCH_HOST: "indexer"
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_INDEX: "ineo"
#      ELASTICSEARCH_USERNAME: "ineouser"
#      ELASTICSEARCH_PASSWORD: "ineopassword"
      FRONTEND_HOST: $FRONTEND_HOST
    volumes:
      - ./service-data:/data
    networks:
      - traefik-public

  ineo:
    image: registry.diginfra.net/tsd/ineo-web:test
    container_name: ineo
    ports:
      - "3000:3000"
    depends_on:
      - service
      - indexer
    networks:
      - traefik-public

