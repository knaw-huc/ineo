volumes:
  index2_data:
  service-data:
  wpdb_data:
  wp-content:

networks:
  traefik-public:
    external: true

services:
#  indexer:
#    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.1
#    container_name: indexer
